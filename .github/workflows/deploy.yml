name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install prerequisites
        run: npm install --save-dev html-validate
      - name: Run HTML lint test
        run: npm run lint:html
      - name: Run YAML lint test
        run: npm run lint:yaml
      - name: Run Nu Html Checker
        run: npm run validate

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install NPM prerequisites
        run: npm install
      - name: Generate static build files
        run: npm run build
      - name: Sync with Bunny object store
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          SOURCE_DIR: "_site"
